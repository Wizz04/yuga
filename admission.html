<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuga Music Academy</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="icon" type="image/png" href="yuga_colour_logo_with_white_circle.png">
    <style>
        :root {
            --primary: #9e038a; /* Vibrant Magenta */
            --dark: #450050;    /* Deep Plum */
            --darker: #2a0031;
            --light: #f8fafc;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            overflow: hidden; /* Prevent main page from scrolling */
            overscroll-behavior: none; /* Prevent bounce effects */
        }

        /* Steady 3D Background */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .page-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        @media (min-width: 1024px) {
            .page-wrapper {
                flex-direction: row;
            }
        }

        /* Left side: Steady Content */
        .info-section {
            flex: 0 0 40%;
            padding: 1.5rem 3rem 3rem 3rem; /* Reduced top padding to move items higher */
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Aligns content to the top */
            background: linear-gradient(135deg, rgba(69, 0, 80, 0.759) 0%, rgba(42, 0, 49, 0.693) 100%);
            backdrop-filter: blur(8px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Header for Logo and Back Button */
        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 2rem;
            flex-shrink: 0;
        }

        .logo {
            height: 110px;
            width: auto;
            object-fit: contain;
        }

        /* Container to center the text content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
        }

        @media (max-width: 1023px) {
            .info-section {
                flex: 0 0 auto;
                padding: 1px 15px 10px 15px; /* Reduced top padding for mobile */
                text-align: center;
                align-items: center;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
            .info-header {
                margin-bottom: 0.1px;
            }
            .logo {
                height: 70px;
            }
            .main-content {
                justify-content: flex-start;
                align-items: center;
            }
        }

        .info-section h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(to right, #ffffff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -1px;
            text-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .info-section p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e5e7eb;
            max-width: 500px;
            margin-top: 1rem;
            margin-bottom: 3rem; /* Adjusted spacing */
        }

        /* Sound Wave Animation */
        .sound-wave {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 25px;
        }

        .bar {
            width: 5px;
            background: var(--primary);
            border-radius: 2px;
            transform-origin: center;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: scaleY(0.1); height: 10px; opacity: 0.4; }
            70% { transform: scaleY(1); height: 20px; opacity: 1; }
        }

        /* Right side: Smart Scrollable Zone */
        .interactive-zone {
            flex: 1;
            position: relative;
            background-color: rgba(26, 0, 30, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @media (min-width: 1024px) {
            .interactive-zone {
                height: 100vh;
            }
        }

        .form-card {
            width: 90%;
            max-width: 640px;
            height: 600px; /* Steady height */
            background: rgba(255, 255, 255, 0.008);
            border-radius: 16px;
            overflow: hidden; /* Clips the iframe's scrollbar */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.366);
            border: 2px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(1px);
            position: relative;
            display: flex;
            flex-shrink: 0;
        }

        iframe {
            /* Make iframe wider than container to hide its scrollbar */
            width: calc(100% + 18px);
            height: 100%;
            border: none;
            display: block;
            background: transparent;
            padding-right: 18px; /* Offset the width to keep content centered */
            box-sizing: border-box;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 0.6rem 1.1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            color: #fff;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 700;
            transition: all 0.3s ease;
            width: fit-content;
            backdrop-filter: blur(5px);
        }

        .back-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateX(-5px);
            box-shadow: 0 0 20px rgba(158, 3, 138, 0.4);
        }

        @media (max-width: 1023px) {
            .page-wrapper { height: 100vh; overflow: hidden; }
            .interactive-zone { flex: 1; padding: 1rem 0; }
            .form-card { width: 91%; height: min(600px, 70vh); border-radius: 16px; box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.352); margin-bottom: 1.3rem; margin-right: 1rem; margin-left: 1rem;}
            .info-section h1 { font-size: 1.6rem; margin-top: 1px; margin-bottom: 0.3rem;} /* Matched snippet mobile size */
            .info-section p { font-size: 0.75rem; margin-top: 0.30rem; margin-bottom: 0.8rem;}
            .sound-wave { margin-top: 0.2rem; height: 20px; }
            .bar { width: 3px; }
            .back-btn { margin-bottom: 0; padding: 0.4rem 0.8rem; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="page-wrapper">
        <section class="info-section">
            <div class="info-header">
                <!-- Logo on the left -->
                <img src="yuga_logo_with_title_white.png" alt="Yuga Music Academy" class="logo">
                
                <!-- Back button on the right -->
                <a href="index.html" class="back-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" 
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 10.5L12 3l9 7.5"/>
                        <path d="M5 10v10h14V10"/>
                    </svg>
                    Home
                </a>
            </div>
            
            <div class="main-content">
                <h1>Begin Your Journey</h1>
                <p>Complete the form to begin your admission process.</p>
                
                <div class="sound-wave">
                    <div class="bar" style="animation-delay: 0.1s"></div>
                    <div class="bar" style="animation-delay: 0.3s"></div>
                    <div class="bar" style="animation-delay: 0.2s"></div>
                    <div class="bar" style="animation-delay: 0.5s"></div>
                    <div class="bar" style="animation-delay: 0.4s"></div>
                    <div class="bar" style="animation-delay: 0.7s"></div>
                    <div class="bar" style="animation-delay: 0.2s"></div>
                    <div class="bar" style="animation-delay: 0.4s"></div>
                    <div class="bar" style="animation-delay: 0.5s"></div>
                    <div class="bar" style="animation-delay: 0.1s"></div>
                    <div class="bar" style="animation-delay: 0.2s"></div>
                    <div class="bar" style="animation-delay: 0.6s"></div>
                    <div class="bar" style="animation-delay: 0.4s"></div>
                </div>
            </div>
        </section>

        <section class="interactive-zone">
            <div class="form-card">
                <iframe 
                    src="https://docs.google.com/forms/d/e/1FAIpQLSfKMEHjjGo1boedtuvS0Md9GuE8gqcK6PeEaFIo4v_LscJpKA/viewform?embedded=true" 
                    frameborder="0" 
                    marginheight="0" 
                    marginwidth="0"
                >Loading…</iframe>
            </div>
        </section>
    </div>

    <script>
        let scene, camera, renderer, particles, notes = [];
        let ribbons = [];
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        const container = document.getElementById('canvas-container');

        const COLORS = {
            magenta: 0x9e038a,
            plum: 0x450050,
            white: 0xffffff,
            gold: 0xffd700
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.z = 8;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const mainLight = new THREE.PointLight(COLORS.magenta, 2);
            mainLight.position.set(5, 5, 5);
            scene.add(mainLight);

            const secondaryLight = new THREE.PointLight(0x4c1d95, 2);
            secondaryLight.position.set(-5, -5, 2);
            scene.add(secondaryLight);

            createParticles();
            createRibbons(); 
            
            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('mousemove', onMouseMove, false);
            animate();
        }

        function onMouseMove(event) {
            mouseX = (event.clientX - window.innerWidth / 2) / 100;
            mouseY = (event.clientY - window.innerHeight / 2) / 100;
        }

        function createRibbons() {
            const ribbonCount = 5; 
            for (let r = 0; r < ribbonCount; r++) {
                const geometry = new THREE.PlaneGeometry(40, 3, 128, 1);
                const material = new THREE.MeshPhongMaterial({ 
                    color: r % 2 === 0 ? COLORS.magenta : 0x6d28d9, 
                    transparent: true, 
                    opacity: 0.05 + (r * 0.03),
                    side: THREE.DoubleSide,
                    wireframe: r % 2 !== 0,
                    emissive: COLORS.magenta,
                    emissiveIntensity: 0.2
                });
                
                const ribbon = new THREE.Mesh(geometry, material);
                
                ribbon.rotation.set(Math.PI / 2.2, 0, (r - 2) * 0.15);
                ribbon.position.set(0, (r - 2) * 1.5, -r);
                
                ribbon.userData = {
                    speed: 0.4 + (r * 0.1),
                    frequency: 0.2 + (r * 0.05),
                    amplitude: 0.5 + (r * 0.15),
                    phase: r * Math.PI / 3
                };

                scene.add(ribbon);
                ribbons.push(ribbon);
            }
        }

        function createParticles() {
            const sphereGeo = new THREE.SphereGeometry(0.05, 12, 12);
            const noteGeo = new THREE.OctahedronGeometry(0.12, 0);
            const icoGeo = new THREE.IcosahedronGeometry(0.1, 0);
            
            for (let i = 0; i < 120; i++) {
                const type = i % 3;
                const material = new THREE.MeshPhongMaterial({
                    color: i % 2 === 0 ? COLORS.magenta : COLORS.white,
                    emissive: i % 2 === 0 ? 0x2a0031 : 0x000000,
                    transparent: true,
                    opacity: 0.7,
                    shininess: 100
                });
                
                let geo;
                if (type === 0) geo = sphereGeo;
                else if (type === 1) geo = noteGeo;
                else geo = icoGeo;

                const particle = new THREE.Mesh(geo, material);
                particle.position.set(
                    (Math.random() - 0.5) * 30,
                    (Math.random() - 0.5) * 20,
                    (Math.random() - 0.5) * 12
                );
                
                particle.userData.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.03,
                    (Math.random() - 0.5) * 0.03,
                    (Math.random() - 0.5) * 0.03
                );
                particle.userData.rotSpeed = (Math.random() - 0.5) * 0.3;
                particle.userData.pulseSpeed = Math.random() * 0.05;
                
                scene.add(particle);
                notes.push(particle);
            }

            const torusGeo = new THREE.TorusGeometry(0.7, 0.35, 66, 104);
            for (let i = 0; i < 15; i++) {
                const torus = new THREE.Mesh(torusGeo, new THREE.MeshPhongMaterial({ 
                    color: i % 2 === 0 ? COLORS.magenta : 0x7e22ce, 
                    transparent: true,
                    opacity: 0.4,
                    wireframe: i % 3 === 0
                }));
                torus.position.set((Math.random()-0.5)*20, (Math.random()-0.5)*15, (Math.random()-0.5)*6);
                torus.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                scene.add(torus);
                notes.push(torus);
                torus.userData.velocity = new THREE.Vector3(
                    (Math.random()-0.5)*0.006, 
                    (Math.random()-0.5)*0.006, 
                    (Math.random()-0.5)*0.002
                );
                torus.userData.rotSpeed = (Math.random() - 0.5) * 0.01;
                torus.userData.pulseSpeed = 0.5 + Math.random() * 0.5;
            }
        }

        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            targetX += (mouseX - targetX) * 0.05;
            targetY += (mouseY - targetY) * 0.05;

            notes.forEach((note, idx) => {
                note.position.add(note.userData.velocity || new THREE.Vector3(0, 0, 0));
                note.rotation.x += note.userData.rotSpeed || 0.005;
                note.rotation.y += note.userData.rotSpeed || 0.005;
                
                if (note.userData.pulseSpeed) {
                    const scale = 1 + Math.sin(time * note.userData.pulseSpeed + idx) * 0.1;
                    note.scale.set(scale, scale, scale);
                }

                if (Math.abs(note.position.x) > 18) note.position.x *= -0.99;
                if (Math.abs(note.position.y) > 14) note.position.y *= -0.99;
            });

            ribbons.forEach((ribbon, idx) => {
                const positions = ribbon.geometry.attributes.position.array;
                const { speed, frequency, amplitude, phase } = ribbon.userData;
                
                for (let i = 0; i < positions.length; i += 3) {
                    const x = positions[i];
                    const wave1 = Math.sin(x * frequency + time * speed + phase);
                    const wave2 = Math.cos(x * frequency * 0.5 + time * speed * 0.8);
                    positions[i + 2] = (wave1 + wave2 * 0.3) * amplitude;
                }
                ribbon.geometry.attributes.position.needsUpdate = true;
                ribbon.position.y += Math.sin(time * 0.5 + idx) * 0.002;
            });

            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (-targetY - camera.position.y) * 0.05;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
